<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Farever — Zone | Dungeon | Loot Tracker</title>
    <style>
        :root {
            --bg: #0d0f13;
            --surface: #171a21;
            --surface2: #1e222b;
            --border: #2a2f3a;
            --gold: #c9a44b;
            --gold-dim: #7a6235;
            --text: #d5d0c8;
            --text-dim: #8a857a;
            --accent: #5b8cbd;
            --accent-hover: #7aabda;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s ease;
            --font: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
            --font-display: 'Georgia', 'Times New Roman', serif;
            --header-height: 88px;
            --dungeon-red: #f87171;
            --item-green: #4ade80;
            --dungeon-lv: #f0c060;
            --dungeon-full: #5baf6b;
            --dungeon-boss: #c97a3a;
            --rarity-blue: #3b82f6;
            --rarity-purple: #a855f7;
            --rarity-legendary: #f59e0b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--font); min-height:100vh;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(201,164,75,0.04) 0%, transparent 60%),
                            radial-gradient(ellipse at 80% 100%, rgba(91,140,189,0.03) 0%, transparent 60%);
            background-attachment: fixed; display:flex; flex-direction:column;
        }
        .header {
            background: var(--surface); border-bottom:1px solid var(--border); padding:20px 32px;
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
            box-shadow:0 2px 16px rgba(0,0,0,0.4); position:sticky; top:0; z-index:100; min-height:var(--header-height);
        }
        .header-brand { display:flex; align-items:center; gap:12px; }
        .header-icon {
            width:44px; height:44px; background:linear-gradient(135deg,#3a2f1f,#5a4025);
            border:2px solid var(--gold-dim); border-radius:var(--radius-sm); display:flex;
            align-items:center; justify-content:center; font-size:22px; color:var(--gold); flex-shrink:0;
        }
        .header h1 { font-family:var(--font-display); font-size:1.8rem; color:var(--gold); letter-spacing:0.04em; font-weight:400; }
        .header-subtitle { font-size:0.75rem; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; }
        .cap-badge {

            font-size:0.68rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase;
            background:rgba(201,164,75,0.12); border:1px solid var(--gold-dim); color:var(--gold); margin-left:8px; white-space:nowrap;
        }
        .header-right { display:flex; align-items:center; gap:16px; }
        .search-wrapper { position:relative; }
        .search-input {
            background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:8px 16px 8px 36px;
            font-size:0.8rem; color:var(--text); font-family:var(--font); width:200px; transition:all var(--transition); outline:none;
        }
        .search-input::placeholder { color:var(--text-dim); }
        .search-input:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(91,140,189,0.2); width:240px; }
        .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:0.9rem; pointer-events:none; }
        .filter-bar {
            background:var(--surface); border-bottom:1px solid var(--border); padding:12px 32px;
            display:flex; flex-wrap:wrap; gap:12px; align-items:center; box-shadow:0 2px 12px rgba(0,0,0,0.4);
            position:sticky; top:var(--header-height); z-index:90;
        }
        .filter-group-wrapper { position:relative; }
        .filter-group-header { display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; transition:all var(--transition); white-space:nowrap; }
        .filter-group-header:hover { background:var(--surface2); border-color:#555; }
        .filter-group-header .arrow { font-size:0.55rem; transition:transform 0.25s ease; color:var(--text-dim); }
        .filter-group-wrapper.open .filter-group-header .arrow { transform:rotate(180deg); }
        .filter-group-header .label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-dim); font-weight:600; }
        .filter-group-header .active-count { background:var(--accent); color:#fff; border-radius:10px; padding:1px 6px; font-size:0.58rem; font-weight:700; }
        .filter-dropdown { display:none; position:absolute; top:100%; left:0; margin-top:6px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; box-shadow:var(--shadow); z-index:95; min-width:220px; max-height:500px; overflow-y:auto; }
        .filter-group-wrapper.open .filter-dropdown { display:flex; flex-wrap:wrap; gap:6px; }
        .filter-btn { padding:5px 10px; font-size:0.68rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; transition:all var(--transition); font-family:var(--font); white-space:nowrap; }
        .filter-btn:hover { background:var(--surface2); color:var(--text); border-color:#555; }

        .type-btn[data-type="Hands"].active { background:rgba(212,165,116,0.20); border-color:#d4a574; color:#e8c9a0; box-shadow:0 0 8px rgba(212,165,116,0.30); }

        .stat-btn[data-stat="Armor"].active { background:rgba(156,163,175,0.20); border-color:#9ca3af; color:#d1d5db; box-shadow:0 0 8px rgba(156,163,175,0.32); }

        .stat-btn[data-stat="Intelligence"].active { background:rgba(129,140,248,0.20); border-color:#818cf8; color:#b4bcfc; box-shadow:0 0 10px rgba(129,140,248,0.38); }

        .main-content { flex:1; }
        .container { max-width:1300px; margin:0 auto; padding:28px 20px 48px; }
        .zone-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:20px; box-shadow:var(--shadow); overflow:hidden; transition:all var(--transition); }
        .zone-card:hover { border-color:#444; }
        .zone-header { display:flex; align-items:center; gap:12px; padding:16px 20px; cursor:pointer; user-select:none; background:var(--surface2); border-bottom:1px solid var(--border); transition:background var(--transition); }
        .zone-header:hover { background:#252a35; }
        .zone-chevron { font-size:0.7rem; color:var(--gold); transition:transform 0.25s ease; flex-shrink:0; width:18px; text-align:center; }
        .zone-card.open .zone-chevron { transform:rotate(90deg); }
        .zone-icon { font-size:1.4rem; flex-shrink:0; }
        .zone-info { flex:1; min-width:0; }
        .zone-name-display { color:var(--gold); font-size:1.15rem; font-weight:700; font-family:var(--font-display); letter-spacing:0.03em; }
        .zone-meta { font-size:0.72rem; color:var(--text-dim); margin-top:2px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .badge { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:10px; font-size:0.65rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; }
        .badge-dungeon { background:rgba(248,113,113,0.18); border:1px solid var(--dungeon-red); color:var(--dungeon-red); box-shadow:0 0 6px rgba(248,113,113,0.25); }

        .dungeons-list { display:flex; flex-direction:column; gap:12px; }
        .empty-msg { text-align:center; color:var(--text-dim); font-style:italic; font-size:0.85rem; padding:18px; }
        .dungeon-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; transition:all var(--transition); }
        .dungeon-card:hover { border-color:#444; }
        .dungeon-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; user-select:none; background:rgba(0,0,0,0.2); border-bottom:1px solid transparent; transition:all var(--transition); }
        .dungeon-card.open .dungeon-header { border-bottom-color:var(--border); background:rgba(0,0,0,0.35); }
        .dungeon-header:hover { background:rgba(255,255,255,0.02); }

                if(serverVer > localVer && Array.isArray(serverData.zones)) {
                    const newData = addDefaultsAndIds(serverData);
                    const oldZoneMap = new Map(appData.zones.map(z => [z.id, z._open]));
                    const oldDungeonMap = new Map();
                    appData.zones.forEach(z => z.dungeons.forEach(d => oldDungeonMap.set(d.id, d._open)));
                    newData.zones.forEach(zone => {
                        if(oldZoneMap.has(zone.id)) zone._open = oldZoneMap.get(zone.id);
                        zone.dungeons.forEach(d => { if(oldDungeonMap.has(d.id)) d._open = oldDungeonMap.get(d.id); });
                    });
                    appData.zones = newData.zones;
                    localStorage.setItem(VERSION_KEY, serverVer);
                    saveState();
                    renderAll();
                    showToast('🔄 Data updated to version ' + serverVer);
                }
            } catch(e) { console.warn('Update check failed:', e); }
        }
        function renderDungeonName(name) {
            if(!name) return '';
            let formatted = escapeHtml(name);
            formatted = formatted.replace(/Lv(\d+)/gi, '<span class="dungeon-lv">Lv$1</span>');
            formatted = formatted.replace(/Full Dungeon/gi, '<span class="dungeon-tag-full">Full Dungeon</span>');
            formatted = formatted.replace(/Boss Only/gi, '<span class="dungeon-tag-boss">Boss Only</span>');
            return formatted;
        }
        function buildStatTagsHtml(item, variantIndex = null) {
            let statValues = {};
            if(item.variants && item.variants.length > 1) {
                const selectedIdx = variantIndex !== null ? variantIndex : (item.variants.findIndex(v => v.rarity === 'blue') !== -1 ? item.variants.findIndex(v => v.rarity === 'blue') : 0);
                statValues = item.variants[selectedIdx].statValues;
            } else if(item.variants && item.variants.length === 1) {
                statValues = item.variants[0].statValues;
            } else {
                statValues = item.statValues || {};
            }
            const sortedStats = sortByOrder(item.stats, STAT_OPTIONS);
            return sortedStats.map(s => {
                const val = statValues[s] ? ` <span class="stat-value">${statValues[s]}</span>` : '';
                return `<span class="tag stat-tag stat-${toSlug(s)}">${escapeHtml(s)}${val}</span>`;
            }).join('');
        }
        function buildRaritySwitcherHtml(item) {
            if(!item.variants || item.variants.length <= 1) return '';
            const sortedVariants = [...item.variants].sort((a,b) => { const order={blue:0,purple:1,legendary:2}; return (order[a.rarity]||0) - (order[b.rarity]||0); });
            const defaultRarity = sortedVariants.find(v => v.rarity === 'blue') || sortedVariants[0];
            const defaultIndex = sortedVariants.indexOf(defaultRarity);
            let buttons = sortedVariants.map((v, idx) => {
                const label = v.rarity === 'blue' ? 'BLU' : v.rarity === 'purple' ? 'PUR' : 'LEG';
                const activeClass = idx === defaultIndex ? ' active' : '';
                return `<button class="rarity-btn${activeClass}" data-rarity="${v.rarity}" data-rarity-index="${idx}">${label}</button>`;
            }).join('');
            return `<div class="rarity-switcher" data-default-index="${defaultIndex}">${buttons}</div>`;
        }
        function renderItemRow(item, index) {
            const primaryType = getPrimaryType(item);
            const typeColorClass = getTypeColorClass(primaryType);
            const sortedTypes = sortByOrder(item.types, TYPE_OPTIONS);
            const sortedClasses = sortByOrder(item.classes, CLASS_OPTIONS);
            const typeTags = sortedTypes.map(t => `<span class="tag type-tag type-${toSlug(t)}">${escapeHtml(t)}</span>`).join('');
            const classTags = sortedClasses.map(cls => `<span class="tag class-${cls}">${CLASS_LABELS[cls]}</span>`).join('');
            const switcherHtml = buildRaritySwitcherHtml(item);
            const defaultIndex = item.variants && item.variants.length > 1 ? (item.variants.findIndex(v => v.rarity === 'blue') !== -1 ? item.variants.findIndex(v => v.rarity === 'blue') : 0) : 0;
            const statTagsHtml = buildStatTagsHtml(item, defaultIndex);
            let detailHtml = '';
            if((isWeapon(item) || item.types.includes('Shield')) && hasAbilities(item)) {
                const abils = [];
                if(item.skill1) abils.push(`<div><strong class="${typeColorClass}">Final Combo Attack:</strong> ${escapeHtml(item.skill1)}</div>`);
                if(item.skill2) abils.push(`<div><strong class="${typeColorClass}">Skill 2:</strong> ${escapeHtml(item.skill2)}</div>`);
                if(item.skill3) abils.push(`<div><strong class="${typeColorClass}">Skill 3:</strong> ${escapeHtml(item.skill3)}</div>`);
                if(item.passive) abils.push(`<div><strong class="${typeColorClass}">Passive:</strong> ${escapeHtml(item.passive)}</div>`);
                detailHtml = abils.join('');
            } else if(isTrinket(item) && hasTrinketPassive(item)) {
                detailHtml = `<div><strong class="${typeColorClass}">Passive:</strong> ${escapeHtml(item.trinketPassive)}</div>`;
            }
            const rowClass = detailHtml ? ' item-row-has-details' : '';
            const clickHandler = detailHtml ? ` data-action="toggle-item-detail" data-item-id="${item.id}"` : '';
            return `<tr class="item-main-row${rowClass}" data-item-id="${item.id}"${clickHandler}>
                <td><span class="item-name ${typeColorClass}">${escapeHtml(item.name)}${detailHtml ? ' <span class="detail-indicator">▶</span>' : ''}</span></td>
                <td><div class="tag-container">${typeTags}</div></td>
                <td><div class="tag-container">${classTags}</div></td>
                <td>${switcherHtml}<div class="tag-container stat-tags-container">${statTagsHtml}</div></td>
            </tr>
            ${detailHtml ? `<tr class="item-detail-row" data-item-detail="${item.id}" style="display:none;"><td colspan="4" class="item-detail-cell"><div class="item-detail-content">${detailHtml}</div></td></tr>` : ''}`;
        }
        function renderLootTable(lootItems) {
            if(lootItems.length === 0) return '';
            const rows = lootItems.map(renderItemRow).join('');
            return `<table class="loot-table"><thead><tr><th style="width:18%;">Item Name</th><th style="width:18%;">Item Type</th><th style="width:20%;">Classes</th><th style="width:38%;">Stats</th></tr></thead><tbody>${rows}</tbody></table>`;
        }
        function renderDungeons(zone) {
            const visibleDungeons = zone.dungeons.map(dungeon => ({ dungeon, filtered: dungeon.loot.filter(itemPassesFilter) })).filter(({filtered}) => filtered.length > 0);
            if(visibleDungeons.length === 0) return '';
            const dList = visibleDungeons.map(({dungeon, filtered}) => {
                const sortedLoot = [...filtered].sort((a,b) => { const rankA=getTypeGroupRank(getPrimaryType(a)), rankB=getTypeGroupRank(getPrimaryType(b)); if(rankA!==rankB) return rankA-rankB; const subA=getTypeSubOrder(getPrimaryType(a)), subB=getTypeSubOrder(getPrimaryType(b)); if(subA!==subB) return subA-subB; return a.name.localeCompare(b.name); });
                const openClass = dungeon._open ? ' open' : '';
                return `<div class="dungeon-card${openClass}" data-dungeon-id="${dungeon.id}">
                    <div class="dungeon-header" data-action="toggle-dungeon" data-zone-id="${zone.id}" data-dungeon-id="${dungeon.id}">
                        <span class="dungeon-chevron">▶</span><span class="dungeon-icon">🏰</span>
                        <div class="dungeon-info"><div class="dungeon-name-display">${renderDungeonName(dungeon.name)}</div><span class="badge badge-item">${filtered.length} item${filtered.length !== 1 ? 's' : ''}</span></div>
                    </div>
                    <div class="dungeon-body">${renderLootTable(sortedLoot)}</div>
                </div>`;
            }).join('');
            return `<div class="dungeons-list">${dList}</div>`;
        }
        function renderAll() {
            const container = document.getElementById('zones-container');
            allItemsMap.clear();
            appData.zones.forEach(z => z.dungeons.forEach(d => d.loot.forEach(item => allItemsMap.set(item.id, item))));
            if(appData.zones.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-dim);"><div style="font-size:3rem;margin-bottom:16px;">🗺️</div><p style="font-size:1.1rem;margin-bottom:8px;">No zones available.</p><p style="font-size:0.85rem;">Data will appear once the adventure begins.</p></div>`;
                return;
            }
            const visibleZones = appData.zones.map(zone => { const total = zone.dungeons.reduce((sum,d) => sum + d.loot.filter(itemPassesFilter).length, 0); return {zone, total}; }).filter(({total}) => total > 0);
            if(visibleZones.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-dim);"><div style="font-size:3rem;margin-bottom:16px;">🔍</div><p style="font-size:1.1rem;margin-bottom:8px;">No zones or dungeons match your filters.</p><p style="font-size:0.85rem;">Try adjusting the search or clearing some filters.</p></div>`;
                return;
            }
            const zonesHtml = visibleZones.map(({zone, total}) => {
                const openClass = zone._open ? ' open' : '';
                const dungeonCount = zone.dungeons.length;
                return `<div class="zone-card${openClass}" data-zone-id="${zone.id}">
                    <div class="zone-header" data-action="toggle-zone" data-zone-id="${zone.id}">
                        <span class="zone-chevron">▶</span><span class="zone-icon">🏞️</span>
                        <div class="zone-info"><div class="zone-name-display">${escapeHtml(zone.name)}</div>
                        <div class="zone-meta"><span class="badge badge-dungeon">${dungeonCount} dungeon${dungeonCount !== 1 ? 's' : ''}</span><span class="badge badge-item">${total} item${total !== 1 ? 's' : ''}</span></div></div>
                    </div>
                    <div class="zone-body">${renderDungeons(zone)}</div>
                </div>`;
            }).join('');
            container.innerHTML = zonesHtml;
            updateFilterBarUI();
        }
        function updateTypeButtonCounts() {
            document.querySelectorAll('#type-dropdown .type-btn').forEach(btn => {
                const type = btn.dataset.type;
                const allItems = appData.zones.flatMap(z => z.dungeons.flatMap(d => d.loot));
                const count = allItems.filter(item => {
                    if(filterClasses.length && !filterClasses.some(cls => item.classes.includes(cls))) return false;
                    if(filterStats.length && !filterStats.every(s => item.stats.includes(s))) return false;
                    if(searchQuery && !item.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                    return item.types.includes(type);
                }).length;
                btn.innerHTML = `${type} <span class="item-count">(${count})</span>`;
            });
        }
        function updateFilterBarUI() {
            document.querySelectorAll('#class-dropdown .class-btn').forEach(b => b.classList.toggle('active', filterClasses.includes(b.dataset.class)));
            document.querySelectorAll('#type-dropdown .type-btn').forEach(b => b.classList.toggle('active', filterTypes.includes(b.dataset.type)));
            document.querySelectorAll('#stat-dropdown .stat-btn').forEach(b => b.classList.toggle('active', filterStats.includes(b.dataset.stat)));
            const classCount = document.getElementById('class-count'); classCount.textContent = filterClasses.length; classCount.style.display = filterClasses.length ? 'inline' : 'none';
            const typeCount = document.getElementById('type-count'); typeCount.textContent = filterTypes.length; typeCount.style.display = filterTypes.length ? 'inline' : 'none';
            const statCount = document.getElementById('stat-count'); statCount.textContent = filterStats.length; statCount.style.display = filterStats.length ? 'inline' : 'none';
            updateTypeButtonCounts();
            const clearBtn = document.getElementById('clear-all-btn');
            if(filterClasses.length === 0 && filterTypes.length === 0 && filterStats.length === 0 && !searchQuery) { clearBtn.style.display = 'none'; } else { clearBtn.style.display = ''; }
        }
        function toggleFilter(type, value) {
            if(type === 'class') { const idx = filterClasses.indexOf(value); idx === -1 ? filterClasses.push(value) : filterClasses.splice(idx,1); }
            else if(type === 'type') { const idx = filterTypes.indexOf(value); idx === -1 ? filterTypes.push(value) : filterTypes.splice(idx,1); }
            else if(type === 'stat') { const idx = filterStats.indexOf(value); idx === -1 ? filterStats.push(value) : filterStats.splice(idx,1); }
            renderAll();
        }
        window.clearAllFilters = function() { filterClasses=[]; filterTypes=[]; filterStats=[]; searchQuery=''; document.getElementById('search-input').value=''; renderAll(); showToast('All filters cleared'); };
        window.toggleZone = function(zoneId) { const zone=appData.zones.find(z=>z.id===zoneId); if(zone){ zone._open=!zone._open; saveState(); renderAll(); } };
        window.toggleDungeon = function(zoneId,dungeonId) { const zone=appData.zones.find(z=>z.id===zoneId); if(!zone) return; const dungeon=zone.dungeons.find(d=>d.id===dungeonId); if(dungeon){ dungeon._open=!dungeon._open; saveState(); renderAll(); } };
        function setupItemDetailToggle() {
            const container = document.getElementById('zones-container');
            container.addEventListener('click', (e) => {
                if(e.target.closest('.rarity-btn')) return;
                const mainRow = e.target.closest('[data-action="toggle-item-detail"]');
                if(!mainRow) return;
                const itemId = mainRow.dataset.itemId;
                const detailRow = container.querySelector(`.item-detail-row[data-item-detail="${itemId}"]`);
                if(!detailRow) return;
                const isOpen = detailRow.style.display !== 'none';
                if(isOpen) { detailRow.style.display = 'none'; mainRow.classList.remove('expanded'); }
                else {
                    container.querySelectorAll('.item-detail-row[style*="display: block"]').forEach(r => { r.style.display = 'none'; const id=r.dataset.itemDetail; if(id){ const main=container.querySelector(`.item-main-row[data-item-id="${id}"]`); if(main) main.classList.remove('expanded'); } });
                    detailRow.style.display = 'table-row'; mainRow.classList.add('expanded');
                }
            });
        }
        function setupRaritySwitcher() {
            const container = document.getElementById('zones-container');
            container.addEventListener('click', (e) => {
                const btn = e.target.closest('.rarity-btn');
                if (!btn) return;
                e.stopPropagation();
                const switcher = btn.closest('.rarity-switcher');
                const row = switcher.closest('tr.item-main-row');
                const itemId = row.dataset.itemId;
                const item = allItemsMap.get(itemId);
                if (!item || !item.variants) return;
                const rarity = btn.dataset.rarity;
                const variantIndex = item.variants.findIndex(v => v.rarity === rarity);
                if (variantIndex === -1) return;
                switcher.querySelectorAll('.rarity-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const statContainer = row.querySelector('.stat-tags-container');
                if (statContainer) {
                    statContainer.innerHTML = buildStatTagsHtml(item, variantIndex);
                }
            });
        }
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
            container.appendChild(el); setTimeout(() => el.remove(), 2200);
        }
        function setupSuggestionModal() {
            const modal = document.getElementById('suggestion-modal');
            const openBtn = document.getElementById('open-suggestion-btn');
            const closeBtn = document.getElementById('close-suggestion-modal');
            const cancelBtn = document.getElementById('cancel-suggestion-modal');
            const form = document.getElementById('suggestion-form');
            function openModal() { modal.classList.add('active'); }
            function closeModal() { modal.classList.remove('active'); form.reset(); }
            openBtn.addEventListener('click', openModal);
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const message = form.querySelector('textarea[name="message"]').value.trim();
                if(!message) return;
                const iframe = document.createElement('iframe'); iframe.name = 'hidden-suggestion-iframe'; iframe.style.display = 'none'; document.body.appendChild(iframe);
                const formEl = document.createElement('form'); formEl.method = 'POST'; formEl.action = FORM_URL; formEl.target = 'hidden-suggestion-iframe'; formEl.style.display = 'none';
                formEl.innerHTML = `<input type="text" name="${ENTRY_ID}" value="${escapeHtml(message)}">`;
                document.body.appendChild(formEl); formEl.submit();
                setTimeout(() => { document.body.removeChild(formEl); document.body.removeChild(iframe); }, 1000);
                showToast('✅ Suggestion sent! Thank you.'); closeModal();
            });
        }
        function buildFilterButtons() {
            const classContainer = document.getElementById('class-dropdown');
            CLASS_OPTIONS.forEach(cls => { const btn = document.createElement('button'); btn.className = 'filter-btn class-btn'; btn.dataset.class = cls; btn.textContent = CLASS_LABELS[cls]; btn.addEventListener('click', () => toggleFilter('class', cls)); classContainer.appendChild(btn); });
            const typeContainer = document.getElementById('type-dropdown');
            TYPE_OPTIONS.forEach(type => { const btn = document.createElement('button'); btn.className = 'filter-btn type-btn'; btn.dataset.type = type; btn.innerHTML = `${type} <span class="item-count">(0)</span>`; btn.addEventListener('click', () => toggleFilter('type', type)); typeContainer.appendChild(btn); });
            const statContainer = document.getElementById('stat-dropdown');
            STAT_OPTIONS.forEach(stat => { const btn = document.createElement('button'); btn.className = 'filter-btn stat-btn'; btn.dataset.stat = stat; btn.textContent = stat; btn.addEventListener('click', () => toggleFilter('stat', stat)); statContainer.appendChild(btn); });
        }
        function setupFilterDropdowns() {
            document.querySelectorAll('.filter-group-header').forEach(header => {
                header.addEventListener('click', (e) => {
                    const wrapper = header.closest('.filter-group-wrapper');
                    const isOpen = wrapper.classList.contains('open');
                    document.querySelectorAll('.filter-group-wrapper').forEach(w => w.classList.remove('open'));
                    if(!isOpen) wrapper.classList.add('open');
                });
            });
            document.addEventListener('click', (e) => { if(!e.target.closest('.filter-group-wrapper')) { document.querySelectorAll('.filter-group-wrapper').forEach(w => w.classList.remove('open')); } });
        }
        function setupGlobalListeners() {
            const searchInput = document.getElementById('search-input');
            let debounceTimer;
            searchInput.addEventListener('input', () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => { searchQuery = searchInput.value.trim(); renderAll(); }, 250); });
            document.getElementById('clear-all-btn').addEventListener('click', window.clearAllFilters);
            document.getElementById('zones-container').addEventListener('click', (e) => {
                const zoneHeader = e.target.closest('[data-action="toggle-zone"]');
                if(zoneHeader) { toggleZone(zoneHeader.dataset.zoneId); return; }
                const dungeonHeader = e.target.closest('[data-action="toggle-dungeon"]');
                if(dungeonHeader) { toggleDungeon(dungeonHeader.dataset.zoneId, dungeonHeader.dataset.dungeonId); }
            });
        }
        async function init() {
            const loaded = await loadData();
            appData = { zones: loaded.zones };
            appData.zones = addDefaultsAndIds({ zones: appData.zones }).zones;
            localStorage.setItem(VERSION_KEY, loaded.version || '0');
            saveState();
            buildFilterButtons();
            setupFilterDropdowns();
            setupGlobalListeners();
            setupItemDetailToggle();
            setupRaritySwitcher();
            setupSuggestionModal();
            renderAll();
            document.body.classList.remove('loading');
            setInterval(checkForUpdate, 5*60*1000);
            checkForUpdate();
            console.log('%c🗺️ Farever %c— Zones & dungeons hidden when empty.', 'color:#c9a44b;font-size:1.2em;', 'color:#d5d0c8;');
        }
        init();
    })();
    </script>
</body>
</html>
