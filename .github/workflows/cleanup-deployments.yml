name: Clean up deployments

on:
  # Manually trigger to delete all old deployments
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name to clean (leave empty for all)'
        required: false
        default: ''
  # Optional: automatically clean when a pull request is closed
  pull_request:
    types: [closed]

permissions:
  deployments: write   # needed to delete deployments
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete deployments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          # If triggered by a PR close, clean deployments for that branch
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
            echo "Cleaning deployments for branch: $BRANCH"
            # List all deployments for this branch and delete each inactive one
            gh api -X GET "/repos/${{ github.repository }}/deployments?ref=$BRANCH" \
              --jq '.[] | select(.statuses_url != null) | .id' | while read id; do
              echo "Deleting deployment $id"
              gh api -X DELETE "/repos/${{ github.repository }}/deployments/$id" --silent || echo "Skipped $id (may be active)"
            done
            exit 0
          fi

          # Manual trigger: delete all deployments, optionally by environment
          ENDPOINT="/repos/${{ github.repository }}/deployments?per_page=100"
          if [ -n "$ENVIRONMENT" ]; then
            ENDPOINT="${ENDPOINT}&environment=${ENVIRONMENT}"
            echo "Cleaning deployments for environment: $ENVIRONMENT"
          else
            echo "Cleaning ALL deployments"
          fi

          # Paginate through all pages and delete each deployment
          PAGE=1
          while true; do
            DATA=$(gh api -X GET "${ENDPOINT}&page=${PAGE}" --jq '.')
            COUNT=$(echo "$DATA" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi
            echo "$DATA" | jq -r '.[].id' | while read id; do
              echo "Deleting deployment ID: $id"
              gh api -X DELETE "/repos/${{ github.repository }}/deployments/$id" --silent || echo "Could not delete $id (might be active)"
            done
            PAGE=$((PAGE+1))
          done
          echo "Cleanup completed."
